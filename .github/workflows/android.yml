name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.5' # 👈 Gradle ဗားရှင်းအဟောင်းကို အတင်းပြောင်းသုံးခိုင်းလိုက်တာပါ

    - name: Build with Gradle
      run: |
        cd app
        gradle assembleDebug
